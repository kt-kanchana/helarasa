<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hela Rasa Admin Panel</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .admin-container {
      max-width: 1200px;
      margin: 20px auto;
      padding: 20px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
    }
    .admin-section {
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
    }
    .form-group input, .form-group select {
      padding: 10px;
      width: 100%;
      max-width: 300px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    button {
      background: #2196F3;  /* Changed from #ff5733 to blue */
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin-right: 10px;
    }
    button:hover {
      background: #1976D2;  /* Changed from #e64a2e to darker blue */
    }
    #categoryList, #itemList {
      margin-top: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ddd;
    }
    th {
      background-color: #f2f2f2;
    }
    .nav-buttons {
      margin-bottom: 20px;
      text-align: right;
    }
    .nav-button {
      background: #4CAF50;  /* Keep green for navigation button */
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    .nav-button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="hela-logo.png" alt="Hela Rasa" class="logo">
    <h1 class="system-name">Admin Panel</h1>
  </div>

  <div class="admin-container">
    <div class="nav-buttons">
      <button onclick="location.href='index.html'" class="nav-button">Go to POS System</button>
    </div>
    <!-- Manage Categories -->
    <div class="admin-section">
      <h2>Manage Categories</h2>
      <div class="form-group">
        <label for="newCategory">Add New Category:</label>
        <input type="text" id="newCategory" placeholder="Enter category name">
        <button onclick="addCategory()">Add Category</button>
      </div>
      <div id="categoryList"></div>
    </div>

    <!-- Manage Items -->
    <div class="admin-section">
      <h2>Manage Items</h2>
      <div class="form-group">
        <label for="itemCategory">Select Category:</label>
        <select id="itemCategory"></select>
      </div>
      <div class="form-group">
        <label for="newItemName">Item Name:</label>
        <input type="text" id="newItemName" placeholder="Enter item name">
      </div>
      <div class="form-group">
        <label for="newItemPrice">Price (LKR):</label>
        <input type="number" id="newItemPrice" placeholder="Enter price" min="0" step="50">
      </div>
      <button onclick="addItem()">Add Item</button>
      <button onclick="removeItem()">Remove Selected Item</button>
      <div id="itemList"></div>
    </div>

    <!-- Update Pricing -->
    <div class="admin-section">
      <h2>Update Pricing</h2>
      <div class="form-group">
        <label for="updateItem">Select Item to Update:</label>
        <select id="updateItem"></select>
      </div>
      <div class="form-group">
        <label for="newPrice">New Price (LKR):</label>
        <input type="number" id="newPrice" placeholder="Enter new price" min="0" step="50">
      </div>
      <button onclick="updatePrice()">Update Price</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
